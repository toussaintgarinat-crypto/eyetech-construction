name: TradelayerIntelligence
options:
  bundleIdPrefix: fr.eyetech
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
targets:
  TradelayerIntelligence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TradelayerIntelligenceApp
    info:
      path: TradelayerIntelligenceApp/Info.plist
      properties:
        CFBundleName: TradeLayer
        CFBundleDisplayName: TradeLayer Intelligence
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Nécessaire pour la réalité augmentée sur chantier"
        NSMicrophoneUsageDescription: "Nécessaire pour les commandes vocales AR"
        NSSpeechRecognitionUsageDescription: "Reconnaissance vocale pour commander les calques AR"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: fr.eyetech.tradelayer
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
